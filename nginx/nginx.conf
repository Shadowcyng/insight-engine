# 1. This tells Nginx to automatically detect how many CPU cores your server has 
# and use all of them. Nginx does not have a GIL, so it handles this perfectly.
worker_processes auto; 

events {
    worker_connections 1024; # Each Nginx worker can handle 1,024 simultaneous connections
}

http {
    # 2. The "upstream" block defines your pool of backend workers.
    # In Docker, you don't need to list out 8 different IP addresses. 
    # Docker's internal DNS automatically routes the name "api" to all your replicas.
    upstream fastapi_cluster {
        server api:8000; 
    }

    server {
        # 3. Nginx listens on port 80 (the standard HTTP port)
        listen 80;
        
        location /api/v1/ws/ {
            proxy_pass http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade"; # Hardcode "Upgrade" to be safe
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            # Minor comment: Essential for long-lived agent logs
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # Minor comment: Handle all other standard API requests
        location / {
            proxy_pass http://fastapi_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}