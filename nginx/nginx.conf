# 1. This tells Nginx to automatically detect how many CPU cores your server has 
# and use all of them. Nginx does not have a GIL, so it handles this perfectly.
worker_processes auto; 

events {
    worker_connections 1024; # Each Nginx worker can handle 1,024 simultaneous connections
}

http {
    # 2. The "upstream" block defines your pool of backend workers.
    # In Docker, you don't need to list out 8 different IP addresses. 
    # Docker's internal DNS automatically routes the name "api" to all your replicas.
    upstream fastapi_cluster {
        server api:8000; 
    }

    server {
        # 3. Nginx listens on port 80 (the standard HTTP port)
        listen 80;
        
        location / {
            # 4. This is the hand-off. It tells Nginx: "Take the incoming request 
            # and forward it to the 'fastapi_cluster' we defined above."
            proxy_pass http://fastapi_cluster;
            
            # 5. The IP Hand-off (Crucial for Security)
            # Because Nginx is making the request to FastAPI, FastAPI will think 
            # every single request comes from Nginx's IP address (e.g., 172.18.0.5).
            # These lines grab the REAL user's IP from the public internet and package it 
            # into the headers so your FastAPI Rate Limiter can still read it.
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}