
# auth example
location /api/v1/ai/ {
            # 1. Ask the auth service if the token is valid first
            auth_request /internal-auth-check;
            
            # 2. If valid, pass the traffic to the AI service
            proxy_pass http://ai_rust_cluster:8080;
        }

        # The internal route Nginx uses to verify tokens
        location = /internal-auth-check {
            internal; # Cannot be hit from the outside world
            proxy_pass http://fastapi_cluster/api/v1/auth/verify-token;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
        }

# Cache and rate limit example

        http {
    # 1. Setup the Rate Limiting RAM Zone (10MB, 5 requests per second)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;

    # 2. Setup the Caching Disk Zone (Path, RAM index size, Max disk size)
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m max_size=1g inactive=60m use_temp_path=off;

    server {
        listen 80;

        location /api/v1/heavy-data {
            # Apply the rate limit (allow a sudden spike of 10, process instantly)
            limit_req zone=api_limit burst=10 nodelay;

            # Apply the cache
            proxy_cache api_cache;
            
            # Cache 200 OK responses for 5 minutes
            proxy_cache_valid 200 5m;
            
            # Cache 404 errors for 1 minute to prevent users from spamming bad URLs
            proxy_cache_valid 404 1m;
            
            # Add a header so the frontend knows if the response was cached (HIT or MISS)
            add_header X-Cache-Status $upstream_cache_status;

            proxy_pass http://fastapi_cluster;
        }
    }
}