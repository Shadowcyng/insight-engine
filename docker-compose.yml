services:
  db:
    image: postgres:16-alpine
    container_name: ie_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: insight_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    
  redis:
    image: redis:7-alpine
    container_name: ie_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
volumes:
  db_data:
  redis_data:
